<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Panel | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        #printArea { display: none; }

        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea {
                display: block !important;
                visibility: visible !important;
                position: absolute;
                left: 0; top: 0;
                width: 58mm; 
                padding: 1mm;
                /* Professional Monospace font for sharp thermal printing */
                font-family: 'Courier New', Courier, monospace;
                color: black;
                background: white;
            }
            #qrcode img { display: block !important; margin: 5px auto; width: 90px; height: 90px; }
            @page { margin: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white sticky top-0 z-[100] shadow-2xl border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 text-center py-4">
             <span class="font-black uppercase tracking-tighter text-sm">Lenskart Pali Management</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        <div class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
            <button onclick="toggleView('form')" id="tab-form" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white">New Entry</button>
            <button onclick="toggleView('search')" id="tab-search" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400">Reprint Label</button>
        </div>

        <div id="orderFormSection" class="space-y-6">
            <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-6">
                <form id="orderForm" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-blue-600 uppercase">Manual Order ID</label>
                        <input type="text" id="manualId" required placeholder="Type ID..." class="w-full border-2 border-blue-100 p-4 rounded-2xl mt-1 outline-none font-bold uppercase">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Customer Name</label>
                        <input type="text" id="custName" required class="w-full border-2 p-4 rounded-2xl mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Street Address</label>
                        <textarea id="address" required rows="2" class="w-full border-2 p-4 rounded-2xl mt-1 outline-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="tel" id="mobile" required placeholder="Mobile" class="border-2 p-4 rounded-2xl outline-none">
                        <input type="tel" id="altMobile" placeholder="Alt Mobile" class="border-2 p-4 rounded-2xl outline-none">
                    </div>
                    <input type="text" id="landmark" placeholder="Landmark" class="w-full border-2 p-4 rounded-2xl outline-none">
                    
                    <div class="p-5 bg-blue-50 rounded-3xl space-y-4">
                        <input type="number" id="pincode" required placeholder="Pincode" onkeyup="handlePincode(this.value)" class="w-full border-2 p-4 rounded-2xl font-black outline-none">
                        <select id="postOffice" class="w-full border-2 p-4 rounded-2xl bg-white"></select>
                        <div class="flex gap-2">
                            <input type="text" id="district" readonly placeholder="City" class="w-1/2 bg-white p-4 rounded-2xl font-bold text-xs">
                            <input type="text" id="state" readonly placeholder="State" class="w-1/2 bg-white p-4 rounded-2xl font-bold text-xs">
                        </div>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs">Save & Print Slip</button>
                </form>
            </div>
        </div>

        <div id="searchSection" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200">
                <input type="text" id="searchInput" placeholder="Order ID..." class="w-full bg-slate-100 p-5 rounded-2xl outline-none font-bold text-center text-blue-600 mb-4 uppercase">
                <button onclick="searchOrder()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase">Find Record</button>
                <div id="searchResult" class="hidden mt-8 p-6 bg-blue-600 text-white rounded-[2rem]">
                    <p id="resName" class="text-xl font-black mb-4 uppercase"></p>
                    <button id="reprintBtn" class="w-full bg-white text-blue-600 font-black py-4 rounded-2xl uppercase text-[10px]">Reprint Label</button>
                </div>
            </div>
        </div>
    </main>

    <div id="printArea">
        <div style="text-align: center; border-bottom: 3px solid #000; padding-bottom: 5px; margin-bottom: 10px;">
            <h1 style="margin: 0; font-size: 22px; font-weight: 900;">DELIVERY SLIP</h1>
        </div>
        
        <div style="font-size: 14px; line-height: 1.4; margin-bottom: 10px;">
            <p style="margin: 0; font-weight: 900; text-decoration: underline;">To,</p>
            <p style="margin: 6px 0 2px 0;">Customer Name - <span id="prName" style="font-weight: 900; font-size: 16px;"></span></p>
            <p style="margin: 0;">Address - <span id="prAddr" style="font-weight: bold;"></span></p>
            <p style="margin: 0;">Post Office - <span id="prPO" style="font-weight: bold;"></span></p>
            <p style="margin: 0;">City - <span id="prCity" style="font-weight: bold;"></span></p>
            <p style="margin: 0;">State - <span id="prState"></span></p>
            <p style="margin: 0;">Pincode - <span id="prPin" style="font-weight: 900; font-size: 15px;"></span></p>
            <p style="margin: 0;">Landmark - <span id="prLandmark" style="font-weight: 900;"></span></p>
            <p style="margin: 4px 0 0 0; font-size: 16px; font-weight: 900; border-top: 2px solid #000; padding-top: 4px;">Contact - <span id="prMob"></span></p>
            <p style="margin: 0;">Alt Contact - <span id="prAltMob"></span></p>
        </div>

        <div style="font-size: 12px; line-height: 1.3; border-top: 1px dashed #000; padding-top: 8px; margin-bottom: 10px;">
            <p style="margin: 0; font-weight: bold;">From,</p>
            <p style="margin: 2px 0 0 0; font-weight: 900;">LENSKART PALI (Shop 3-4)</p>
            <p style="margin: 0;">Ahinsa Complex, Suraj Pole, Pali, RJ 306401</p>
            <p style="margin: 0;">Contact - +91 8290776551</p>
        </div>

        <div style="margin: 5px 0; text-align: center; border-top: 2px solid #000; padding-top: 10px;">
            <p style="margin: 0; font-size: 11px; font-weight: 900; letter-spacing: 2px;">BARCODE</p>
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <p style="margin: 5px 0 0 0; font-size: 14px; font-weight: 900;">Order id:- <span id="prId"></span></p>
        </div>
        <div style="font-size: 10px; text-align: center; margin-top: 5px; font-weight: bold;">
            <p>*** THANK YOU ***</p>
        </div>
    </div>

    <script>
        const SYSTEM_PASSWORD = "PALI_STORE_PRO"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcpgxDJoRyOwdct7PWtPl6HxqYv-TCiDBiQ9R26QviiGQXLcJaXXTZ30oBcsx7bYjo2A/exec";

        function validateSession() {
            if (sessionStorage.getItem('pali_auth') !== 'true') {
                const pass = prompt("Enter Password");
                if (pass === SYSTEM_PASSWORD) sessionStorage.setItem('pali_auth', 'true');
                else { document.body.innerHTML = ""; window.stop(); }
            }
        }
        validateSession();

        function toggleView(mode) {
            document.getElementById('orderFormSection').classList.toggle('hidden', mode !== 'form');
            document.getElementById('searchSection').classList.toggle('hidden', mode !== 'search');
            document.getElementById('tab-form').className = mode === 'form' ? 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white' : 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400';
            document.getElementById('tab-search').className = mode === 'search' ? 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white' : 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400';
        }

        async function handlePincode(pin) {
            if(pin.length === 6) {
                const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                const data = await res.json();
                if(data[0].Status === "Success") {
                    const po = data[0].PostOffice;
                    document.getElementById('postOffice').innerHTML = po.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
                    document.getElementById('district').value = po[0].District;
                    document.getElementById('state').value = po[0].State;
                }
            }
        }

        async function searchOrder() {
            const id = document.getElementById('searchInput').value.toUpperCase();
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getOrder", orderId: id }) });
                const result = await res.json();
                if(result.status === "success") {
                    document.getElementById('resName').innerText = result.data.name;
                    document.getElementById('searchResult').classList.remove('hidden');
                    document.getElementById('reprintBtn').onclick = () => { triggerPrint(id, result.data); };
                } else alert("Order Not Found");
            } catch (e) { alert("Cloud Error"); }
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const manualId = document.getElementById('manualId').value.toUpperCase();
            const payload = {
                action: "addOrder",
                orderId: manualId,
                name: document.getElementById('custName').value,
                mobile: document.getElementById('mobile').value,
                altMobile: document.getElementById('altMobile').value || "N/A",
                landmark: document.getElementById('landmark').value || "N/A",
                pincode: document.getElementById('pincode').value,
                postOffice: document.getElementById('postOffice').value,
                district: document.getElementById('district').value,
                state: document.getElementById('state').value,
                address: document.getElementById('address').value
            };
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === "success") { triggerPrint(manualId, payload); e.target.reset(); }
            } catch (e) { alert("Save Error"); }
        };

        function triggerPrint(orderId, data) {
            document.getElementById('prId').innerText = orderId;
            document.getElementById('prName').innerText = data.name;
            document.getElementById('prAddr').innerText = data.address;
            document.getElementById('prPO').innerText = data.postOffice || "";
            document.getElementById('prCity').innerText = data.district || "";
            document.getElementById('prState').innerText = data.state || "";
            document.getElementById('prPin').innerText = data.pincode;
            document.getElementById('prLandmark').innerText = data.landmark;
            document.getElementById('prMob').innerText = data.mobile;
            document.getElementById('prAltMob').innerText = data.altMobile;
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: orderId, width: 90, height: 90, correctLevel : QRCode.CorrectLevel.H });
            setTimeout(() => { window.print(); }, 1200);
        }
    </script>
</body>
</html>
