<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Panel | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        #printArea { display: none; }

        /* Rugtek Thermal Print Optimization */
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea {
                display: block !important;
                visibility: visible !important;
                position: absolute;
                left: 0; top: 0;
                width: 58mm; 
                padding: 1mm;
                font-family: 'Calibri', 'Trebuchet MS', sans-serif !important;
                font-size: 16px !important;
                font-weight: 700 !important;
                color: #000000 !important;
                background: #ffffff !important;
                line-height: 1.1 !important;
            }
            #qrcode canvas { display: none !important; }
            #qrcode img { display: block !important; margin: 5px auto; width: 90px; height: 90px; }
            @page { margin: 0; }
        }
        .modal-blur { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.6); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white sticky top-0 z-[100] shadow-2xl border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-4">
                <span class="font-black uppercase tracking-tighter text-sm">Lenskart Pali Store</span>
                <div class="flex h-full gap-2">
                    <button onclick="toggleView('form')" id="nav-store" class="px-3 py-2 text-[10px] font-bold uppercase bg-blue-600 rounded-lg">New Entry</button>
                    <button onclick="toggleView('search')" id="nav-reprint" class="px-3 py-2 text-[10px] font-bold uppercase opacity-60 rounded-lg">Reprint</button>
                    <a href="rider.html" class="px-3 py-2 text-[10px] font-bold uppercase opacity-60">Rider</a>
                    <a href="admin.html" class="px-3 py-2 text-[10px] font-bold uppercase opacity-60">Master</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        
        <div id="orderFormSection" class="space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 p-8">
                <form id="orderForm" class="space-y-5">
                    <div>
                        <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Manual Order ID</label>
                        <input type="text" id="manualId" required placeholder="Type ID..." class="w-full border-2 p-4 rounded-2xl font-bold uppercase outline-none focus:border-blue-600 mt-1">
                    </div>
                    <input type="text" id="custName" required placeholder="Customer Name" class="w-full border-2 p-4 rounded-2xl outline-none font-bold uppercase">
                    <textarea id="address" required placeholder="Street Address" class="w-full border-2 p-4 rounded-2xl outline-none font-bold"></textarea>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex items-center border-2 rounded-2xl focus-within:border-blue-600 bg-white overflow-hidden">
                            <span class="pl-4 pr-2 font-black text-slate-400 bg-slate-50 py-4">+91</span>
                            <input type="tel" id="mobile" required pattern="[0-9]{10}" maxlength="10" placeholder="10 Digits" class="w-full p-4 pl-0 bg-transparent outline-none font-bold">
                        </div>
                        <div class="flex items-center border-2 rounded-2xl focus-within:border-blue-600 bg-white overflow-hidden">
                            <span class="pl-4 pr-2 font-black text-slate-400 bg-slate-50 py-4">+91</span>
                            <input type="tel" id="altMobile" pattern="[0-9]{10}" maxlength="10" placeholder="Optional" class="w-full p-4 pl-0 bg-transparent outline-none font-bold">
                        </div>
                    </div>
                    
                    <input type="text" id="landmark" placeholder="Landmark (Optional)" class="w-full border-2 p-4 rounded-2xl outline-none font-bold">
                    
                    <div class="p-5 bg-blue-50 rounded-3xl space-y-4 border border-blue-100">
                        <input type="number" id="pincode" required placeholder="Pincode" onkeyup="handlePincode(this.value)" class="w-full border-2 p-4 rounded-2xl font-black outline-none bg-white">
                        <select id="postOffice" class="w-full border-2 p-4 rounded-2xl bg-white outline-none font-bold"></select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="city" readonly placeholder="City" class="w-full border-2 border-transparent p-4 rounded-2xl bg-blue-100/50 outline-none font-bold text-blue-800 text-sm">
                            <input type="text" id="state" readonly placeholder="State" class="w-full border-2 border-transparent p-4 rounded-2xl bg-blue-100/50 outline-none font-bold text-blue-800 text-sm">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-xs shadow-lg">Review & Save</button>
                </form>
            </div>
        </div>

        <div id="searchSection" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="searchInput" placeholder="Search Order ID..." class="flex-1 bg-slate-100 p-5 rounded-2xl outline-none font-bold text-blue-600 uppercase border-2 border-transparent focus:border-blue-500">
                    <button onclick="searchOrder()" class="bg-blue-600 text-white px-6 rounded-2xl font-black text-xs uppercase"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div id="searchResult" class="hidden space-y-5 animate-in slide-in-from-top duration-300">
                    <div class="p-6 bg-slate-900 text-white rounded-[2rem] shadow-2xl">
                        <p id="resId" class="text-xl font-black font-mono text-blue-400"></p>
                        <p id="resName" class="font-bold uppercase mt-2 text-lg"></p>
                        <p id="resMob" class="text-sm font-bold text-green-400"></p>
                        <p id="resAddr" class="text-[10px] mt-2 opacity-60 leading-tight"></p>
                        <p id="resLocation" class="text-[10px] font-bold text-blue-300 mt-1"></p>
                    </div>
                    <button id="reprintBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl">Print Label Now</button>
                </div>
            </div>
        </div>
    </main>

    <div id="confirmModal" class="fixed inset-0 z-[400] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in duration-200">
            <div class="p-6 bg-slate-50 border-b text-center"><h3 class="text-[10px] font-black uppercase text-slate-400">Review Data</h3></div>
            <div id="confirmContent" class="p-8 space-y-2 text-sm font-bold"></div>
            
            <div class="p-6 space-y-3">
                <button onclick="finalSync(true)" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> Print and Save
                </button>
                <button onclick="finalSync(false)" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-md flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Save Only (No Print)
                </button>
                <button onclick="closeConfirm()" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase">
                    <i class="fa-solid fa-pen"></i> Back to Edit
                </button>
            </div>
        </div>
    </div>

    <div id="globalLoader" class="fixed inset-0 z-[500] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white px-10 py-8 rounded-[2rem] shadow-2xl flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-800">Getting data please wait</p>
        </div>
    </div>

    <div id="successPopup" class="fixed inset-0 z-[600] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-check text-2xl"></i></div>
            <h3 class="text-lg font-black uppercase">Submitted</h3>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Cloud Sync Complete</p>
            <button onclick="location.reload()" class="w-full mt-6 bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-[10px]">OK</button>
        </div>
    </div>

    <div id="printArea">
        <div style="text-align: center; border-bottom: 2.5px solid #000; padding-bottom: 5px; margin-bottom: 10px;">
            <h1 style="margin: 0; font-size: 20px;">DELIVERY SLIP</h1>
        </div>
        <div style="margin-bottom: 10px;">
            <p style="margin: 0; text-decoration: underline;">To,</p>
            <p style="margin: 5px 0 0 0;">Customer Name - <span id="prName"></span></p>
            <p style="margin: 0;">Address - <span id="prAddr"></span></p>
            <p style="margin: 0;">PO - <span id="prPO"></span></p>
            <p style="margin: 0;">City - <span id="prCity"></span></p>
            <p style="margin: 0;">State - <span id="prState"></span></p>
            <p style="margin: 0;">Pincode - <span id="prPin"></span></p>
            <p style="margin: 0;">Landmark - <span id="prLandmark"></span></p>
            
            <div style="border-top: 2px solid #000; margin-top: 6px; padding-top: 4px;">
                <p style="margin: 0; font-weight: 900;">Contact - <span id="prMob"></span></p>
                <p style="margin: 0;">Alt Contact - <span id="prAltMob"></span></p>
            </div>
        </div>
        <div style="text-align: center; border-top: 2px solid #000; margin-top: 10px; padding-top: 10px;">
            <div id="qrcode"></div>
            <p style="margin: 5px 0 0 0;">Order id:- <span id="prId"></span></p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcpgxDJoRyOwdct7PWtPl6HxqYv-TCiDBiQ9R26QviiGQXLcJaXXTZ30oBcsx7bYjo2A/exec"; 
        let tempPayload = null;

        function toggleView(v) {
            document.getElementById('orderFormSection').classList.toggle('hidden', v !== 'form');
            document.getElementById('searchSection').classList.toggle('hidden', v !== 'search');
            document.getElementById('nav-store').className = v === 'form' ? 'px-3 py-2 text-[10px] font-bold uppercase bg-blue-600 rounded-lg' : 'px-3 py-2 text-[10px] font-bold uppercase opacity-60 rounded-lg';
            document.getElementById('nav-reprint').className = v === 'search' ? 'px-3 py-2 text-[10px] font-bold uppercase bg-blue-600 rounded-lg' : 'px-3 py-2 text-[10px] font-bold uppercase opacity-60 rounded-lg';
        }

        async function handlePincode(pin) {
            if(pin.length === 6) {
                const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                const data = await res.json();
                if(data[0].Status === "Success") {
                    const po = data[0].PostOffice;
                    document.getElementById('postOffice').innerHTML = po.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
                    document.getElementById('city').value = po[0].District;
                    document.getElementById('state').value = po[0].State;
                }
            }
        }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            
            const mainMobile = document.getElementById('mobile').value;
            const altMobileRaw = document.getElementById('altMobile').value;
            const formattedMobile = "+91 " + mainMobile;
            const formattedAltMobile = altMobileRaw ? ("+91 " + altMobileRaw) : "N/A";

            tempPayload = {
                action: "addOrder",
                orderId: document.getElementById('manualId').value.toUpperCase().trim(),
                name: document.getElementById('custName').value,
                mobile: formattedMobile,
                altMobile: formattedAltMobile,
                landmark: document.getElementById('landmark').value || "N/A",
                pincode: document.getElementById('pincode').value,
                postOffice: document.getElementById('postOffice').value,
                city: document.getElementById('city').value || "N/A",
                state: document.getElementById('state').value || "N/A",
                address: document.getElementById('address').value
            };

            document.getElementById('confirmContent').innerHTML = `
                <div class="space-y-1">
                    <p class="text-blue-600 font-black">ID: ${tempPayload.orderId}</p>
                    <p>NAME: ${tempPayload.name.toUpperCase()}</p>
                    <p>MOB: ${tempPayload.mobile}</p>
                    <p class="text-[10px] opacity-60 leading-tight">${tempPayload.address.toUpperCase()}</p>
                    <p class="text-[10px] text-blue-600">${tempPayload.city}, ${tempPayload.state} - ${tempPayload.pincode}</p>
                </div>
            `;
            document.getElementById('confirmModal').classList.replace('hidden', 'flex');
        };

        async function finalSync(shouldPrint) {
            closeConfirm();
            showLoading(); 
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(tempPayload) });
                const result = await res.json();
                
                if (result.status === "success") {
                    if(shouldPrint) triggerPrint(tempPayload.orderId, tempPayload);
                    hideLoading();
                    document.getElementById('successPopup').classList.replace('hidden', 'flex');
                } else if (result.message && result.message.includes("Duplicate")) {
                    hideLoading();
                    alert("DUPLICATE ORDER ID!\n\nThis ID is already used. Please use a unique ID.");
                } else {
                    hideLoading();
                    alert("Backend Error: " + (result.message || "Unknown Error"));
                }
            } catch (e) { 
                hideLoading();
                alert("Detailed Sync Error: " + e.message + "\n\n1. Ensure Google Apps Script 'Who has access' is set to 'Anyone'.\n2. Ensure your SCRIPT_URL is correctly pasted in the code."); 
            }
        }

        async function searchOrder() {
            const id = document.getElementById('searchInput').value.toUpperCase().trim();
            if(!id) return;
            showLoading();
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getOrderDetail", orderId: id }) });
                const result = await res.json();
                if(result.status === "success" && result.data.order) {
                    const d = result.data.order;
                    document.getElementById('resId').innerText = id;
                    document.getElementById('resName').innerText = d[1];
                    document.getElementById('resMob').innerText = d[3];
                    document.getElementById('resAddr').innerText = d[2];
                    document.getElementById('resLocation').innerText = `${d[6]}, ${d[7]}, ${d[8]} - ${d[5]}`;
                    
                    document.getElementById('searchResult').classList.remove('hidden');
                    document.getElementById('reprintBtn').onclick = () => triggerPrint(id, { 
                        name: d[1], address: d[2], postOffice: d[6], city: d[7], state: d[8], pincode: d[5], landmark: d[9], mobile: d[3], altMobile: d[4] 
                    });
                } else {
                    alert("Order ID Not Found in Database.");
                    document.getElementById('searchResult').classList.add('hidden');
                }
            } catch (e) { 
                hideLoading();
                alert("Detailed Search Error: " + e.message + "\n\nEnsure Google Apps Script is deployed to 'Anyone'."); 
            }
            hideLoading();
        }

        function triggerPrint(id, data) {
            document.getElementById('prId').innerText = id;
            document.getElementById('prName').innerText = data.name;
            document.getElementById('prAddr').innerText = data.address;
            document.getElementById('prPO').innerText = data.postOffice || "";
            document.getElementById('prCity').innerText = data.city || "";
            document.getElementById('prState').innerText = data.state || "";
            document.getElementById('prPin').innerText = data.pincode;
            document.getElementById('prLandmark').innerText = data.landmark;
            document.getElementById('prMob').innerText = data.mobile;
            document.getElementById('prAltMob').innerText = data.altMobile || "N/A";
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: id, width: 100, height: 100, correctLevel : QRCode.CorrectLevel.H });
            setTimeout(() => window.print(), 1000);
        }

        function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
        function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }
        function closeConfirm() { document.getElementById('confirmModal').classList.replace('flex', 'hidden'); }
    </script>
</body>
</html>
