<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Panel | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal-blur { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.6); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white sticky top-0 z-[100] shadow-2xl border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center gap-4">
                <span class="font-black uppercase tracking-tighter text-sm">Pali Rider App</span>
                <div class="flex h-full gap-2">
                    <a href="index.html" class="px-3 py-2 text-[10px] font-bold uppercase opacity-60">Store</a>
                    <a href="rider.html" class="px-3 py-2 text-[10px] font-bold uppercase bg-blue-600 rounded-lg">Rider</a>
                    <a href="admin.html" class="px-3 py-2 text-[10px] font-bold uppercase opacity-60">Master</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        
        <div class="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
            <button onclick="toggleRiderView('scan')" id="tab-scan" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white transition-all">New Scan</button>
            <button onclick="toggleRiderView('history')" id="tab-history" class="flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400 transition-all">Scan History</button>
        </div>

        <div id="scanSection" class="space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 p-8 space-y-5">
                
                <div>
                    <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Order ID</label>
                    <input type="text" id="orderIdSearch" placeholder="ORD..." class="w-full border-2 p-4 rounded-2xl font-black uppercase outline-none focus:border-blue-600 mt-1 text-lg">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase text-center">1. Label Info</p>
                        <button onclick="capture('label')" class="w-full h-32 bg-slate-50 rounded-2xl border-2 border-dashed border-blue-200 flex flex-col items-center justify-center relative overflow-hidden hover:bg-blue-50 transition">
                            <i class="fa-solid fa-barcode text-2xl mb-2 text-blue-600"></i>
                            <span class="text-[9px] font-black uppercase text-blue-600">Scan Label</span>
                            <img id="prev-label" class="hidden absolute inset-0 w-full h-full object-cover">
                        </button>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[9px] font-black text-slate-400 uppercase text-center">2. Parcel Proof</p>
                        <button onclick="capture('parcel')" class="w-full h-32 bg-slate-50 rounded-2xl border-2 border-dashed border-blue-200 flex flex-col items-center justify-center relative overflow-hidden hover:bg-blue-50 transition">
                            <i class="fa-solid fa-box text-2xl mb-2 text-blue-600"></i>
                            <span class="text-[9px] font-black uppercase text-blue-600">Take Photo</span>
                            <img id="prev-parcel" class="hidden absolute inset-0 w-full h-full object-cover">
                        </button>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Courier Partner</label>
                    <select id="courier" class="w-full border-2 p-4 rounded-2xl bg-white font-bold outline-none focus:border-blue-600 mt-1">
                        <option value="DTDC Express">DTDC Express</option>
                        <option value="Delhivery">Delhivery</option>
                        <option value="BlueDart">BlueDart</option>
                        <option value="Local Rider">Local Rider</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tracking ID / AWB</label>
                    <input type="text" id="trackingId" placeholder="Enter AWB No..." class="w-full border-2 p-4 rounded-2xl font-bold outline-none focus:border-blue-600 mt-1 uppercase">
                </div>

                <button onclick="syncToCloud()" id="syncBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-xs shadow-lg mt-4 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload & Sync
                </button>
            </div>
        </div>

        <div id="historySection" class="hidden space-y-4">
            <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-blue-800 uppercase tracking-widest">Session History</p>
                    <p class="text-xs font-bold text-blue-600">Recent scans saved locally</p>
                </div>
                <i class="fa-solid fa-clock-rotate-left text-2xl text-blue-200"></i>
            </div>
            <div id="historyList" class="space-y-3">
                </div>
        </div>
    </main>

    <div id="globalLoader" class="fixed inset-0 z-[500] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white px-10 py-8 rounded-[2rem] shadow-2xl flex flex-col items-center gap-4">
            <div class="animate-spin h-8 w-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-800">Compressing & Syncing...</p>
        </div>
    </div>

    <div id="successPopup" class="fixed inset-0 z-[600] hidden items-center justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center animate-in zoom-in duration-200">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-check text-2xl"></i>
            </div>
            <h3 class="text-lg font-black uppercase">Synced Successfully</h3>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Images Saved to Drive</p>
            <button onclick="resetRiderForm()" class="w-full mt-6 bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest">Next Parcel</button>
        </div>
    </div>

    <script>
        // ⚠️ PASTE YOUR LATEST GOOGLE APPS SCRIPT URL HERE ⚠️
        const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE"; 
        
        let labelData = "";
        let parcelData = "";

        // --- UI NAVIGATION ---
        function toggleRiderView(v) {
            document.getElementById('scanSection').classList.toggle('hidden', v !== 'scan');
            document.getElementById('historySection').classList.toggle('hidden', v !== 'history');
            document.getElementById('tab-scan').className = v === 'scan' ? 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white transition-all' : 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400 transition-all';
            document.getElementById('tab-history').className = v === 'history' ? 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl bg-blue-600 text-white transition-all' : 'flex-1 py-3 text-[10px] font-black uppercase rounded-xl text-slate-400 transition-all';
            if(v === 'history') loadLocalHistory();
        }

        // --- HARDWARE CAMERA & FAST COMPRESSION ---
        function capture(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                compressImage(file, type);
            };
            input.click();
        }

        function compressImage(file, type) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Optimal width for clear tracking IDs while keeping size small
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Compress to 60% quality JPEG (~50KB to 100KB)
                    const base64 = canvas.toDataURL('image/jpeg', 0.6);
                    
                    if(type === 'label') { 
                        labelData = base64; 
                        document.getElementById('prev-label').src = base64; 
                        document.getElementById('prev-label').classList.remove('hidden'); 
                    } else { 
                        parcelData = base64; 
                        document.getElementById('prev-parcel').src = base64; 
                        document.getElementById('prev-parcel').classList.remove('hidden'); 
                    }
                };
            };
        }

        // --- CLOUD SYNC LOGIC ---
        async function syncToCloud() {
            const orderId = document.getElementById('orderIdSearch').value.toUpperCase().trim();
            const courier = document.getElementById('courier').value;
            const trackingId = document.getElementById('trackingId').value.trim().toUpperCase();

            if (!orderId || !trackingId) {
                alert("Please enter both Order ID and Tracking ID.");
                return;
            }
            if (!labelData && !parcelData) {
                if(!confirm("You haven't added any photos. Continue anyway?")) return;
            }

            showLoading();
            
            const payload = {
                action: "updateTracker",
                orderId: orderId,
                courier: courier,
                trackingId: trackingId,
                riderName: "PALI_RIDER", // Fixed identifier
                pickupDate: new Date().toLocaleDateString(),
                trackingImg: labelData,
                parcelImg: parcelData
            };

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if(result.status === "success") {
                    saveToLocalHistory(payload);
                    hideLoading();
                    document.getElementById('successPopup').classList.replace('hidden', 'flex');
                } else {
                    alert("Error: Order ID might not exist in the Master Database.");
                    hideLoading();
                }
            } catch (e) { 
                alert("Sync Failed. Please check your internet connection."); 
                hideLoading();
            }
        }

        // --- LOCAL HISTORY MANAGER (Instant Load) ---
        function saveToLocalHistory(data) {
            let history = JSON.parse(localStorage.getItem('pali_rider_history') || '[]');
            // Remove if editing an existing entry to avoid duplicates in history
            history = history.filter(item => item.id !== data.orderId);
            
            history.unshift({ 
                id: data.orderId, 
                courier: data.courier, 
                tracking: data.trackingId, 
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            // Keep only the last 20 scans to prevent memory bloat
            localStorage.setItem('pali_rider_history', JSON.stringify(history.slice(0, 20)));
        }

        function loadLocalHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('pali_rider_history') || '[]');
            
            if (history.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400 text-[10px] font-bold uppercase">No scans in this session.</div>`;
                return;
            }

            list.innerHTML = history.map(row => `
                <div class="bg-white p-5 rounded-[1.5rem] border border-slate-200 shadow-sm flex justify-between items-center animate-in slide-in-from-bottom duration-300">
                    <div>
                        <p class="text-[12px] font-black text-blue-600 font-mono">${row.id}</p>
                        <p class="text-xs font-bold text-slate-800">${row.courier} - AWB: ${row.tracking}</p>
                        <p class="text-[9px] text-slate-400 uppercase font-black mt-1"><i class="fa-regular fa-clock"></i> ${row.time}</p>
                    </div>
                    <button onclick="editEntry('${row.id}', '${row.courier}', '${row.tracking}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 w-10 h-10 rounded-xl flex items-center justify-center transition-all">
                        <i class="fa-solid fa-pen text-sm"></i>
                    </button>
                </div>
            `).join('');
        }

        function editEntry(id, courier, tracking) {
            toggleRiderView('scan');
            document.getElementById('orderIdSearch').value = id;
            document.getElementById('courier').value = courier;
            document.getElementById('trackingId').value = tracking;
            
            // Reset images for safety so old photos aren't accidentally re-uploaded to a new scan
            labelData = ""; parcelData = "";
            document.getElementById('prev-label').classList.add('hidden');
            document.getElementById('prev-parcel').classList.add('hidden');
            
            document.getElementById('syncBtn').innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Update Entry`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- UTILS ---
        function showLoading() { document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
        function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }
        function resetRiderForm() { location.reload(); }
    </script>
</body>
</html>
