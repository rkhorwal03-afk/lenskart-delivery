<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Panel | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        .modal-blur { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.6); }
        #qr-reader { width: 100% !important; border-radius: 1rem; overflow: hidden; border: none; }
        #qr-reader video { border-radius: 1rem; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

<nav class="bg-slate-900 text-white sticky top-0 z-[100] shadow-2xl border-b border-slate-800">
    <div class="max-w-xl mx-auto px-4 flex justify-between items-center h-14">
        <span class="font-black uppercase text-xs text-blue-400">Lenskart · Rider App</span>
        <div class="flex gap-1">
            <a href="index.html" class="px-3 py-1.5 text-[10px] font-bold uppercase opacity-50">Store</a>
            <button onclick="toggleRiderView('scan')" id="tab-scan" class="px-3 py-1.5 text-[10px] font-black uppercase rounded-lg bg-blue-600 transition-all">New Scan</button>
            <button onclick="toggleRiderView('history')" id="tab-history" class="px-3 py-1.5 text-[10px] font-black uppercase rounded-lg opacity-50 transition-all">History</button>
        </div>
    </div>
</nav>

<main class="max-w-xl mx-auto p-4 space-y-6">
    
    <div id="scanSection" class="space-y-6">
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-8 space-y-6">
            
            <div>
                <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">1. Order ID</label>
                
                <button id="scanBtn" onclick="startQRScanner()" class="w-full mt-2 bg-blue-50 text-blue-700 font-black py-4 rounded-2xl uppercase text-xs flex items-center justify-center gap-2 border-2 border-blue-200 hover:bg-blue-100 transition shadow-sm">
                    <i class="fa-solid fa-qrcode text-lg"></i> Direct Camera Scan
                </button>
                
                <div id="qr-reader" class="hidden mt-3 border-2 border-blue-400 bg-black"></div>

                <div class="flex items-center gap-3 my-4">
                    <hr class="flex-1 border-slate-200"><span class="text-[9px] font-black text-slate-400 uppercase">OR</span><hr class="flex-1 border-slate-200">
                </div>

                <div class="flex gap-2">
                    <input type="text" id="orderIdSearch" placeholder="Manual Input..." class="flex-1 border-2 p-4 rounded-2xl font-black uppercase outline-none focus:border-blue-600 text-lg bg-slate-50">
                    <button onclick="verifyOrderId()" class="bg-slate-900 text-white px-6 rounded-2xl font-black transition hover:bg-slate-800 shadow-md">
                        <i class="fa-solid fa-magnifying-glass text-lg"></i>
                    </button>
                </div>
                
                <p id="verifyResult" class="text-[10px] font-bold mt-3 hidden uppercase tracking-wide"></p>
            </div>
            
            <div class="pt-2 border-t border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">2. Capture 2 Parcel Photos</label>
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <button onclick="capture('parcel1')" class="w-full h-32 bg-slate-50 rounded-2xl border-2 border-dashed border-blue-200 flex flex-col items-center justify-center relative overflow-hidden transition hover:bg-slate-100">
                        <i class="fa-solid fa-box text-xl mb-1 text-blue-600"></i><span class="text-[9px] font-black uppercase text-blue-600">Pic 1</span>
                        <img id="prev-parcel1" class="hidden absolute inset-0 w-full h-full object-cover">
                    </button>
                    <button onclick="capture('parcel2')" class="w-full h-32 bg-slate-50 rounded-2xl border-2 border-dashed border-blue-200 flex flex-col items-center justify-center relative overflow-hidden transition hover:bg-slate-100">
                        <i class="fa-solid fa-box-open text-xl mb-1 text-blue-600"></i><span class="text-[9px] font-black uppercase text-blue-600">Pic 2</span>
                        <img id="prev-parcel2" class="hidden absolute inset-0 w-full h-full object-cover">
                    </button>
                </div>
            </div>

            <div class="pt-2 border-t border-slate-100">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">3. Courier Partner</label>
                <select id="courier" class="w-full border-2 p-4 rounded-2xl bg-white font-bold outline-none focus:border-blue-600 mt-1">
                    <option value="DTDC Express">DTDC Express</option>
                    <option value="Delhivery">Delhivery</option>
                    <option value="BlueDart">BlueDart</option>
                    <option value="Local Rider">Local Rider</option>
                </select>
            </div>

            <div class="pt-2 border-t border-slate-100">
                <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">4. Tracking Label (OCR)</label>
                <button onclick="capture('label')" class="w-full h-24 mb-3 bg-blue-50 rounded-2xl border-2 border-blue-300 flex items-center justify-center relative overflow-hidden transition hover:bg-blue-100 gap-3 mt-2">
                    <i class="fa-solid fa-camera text-blue-600 text-xl"></i>
                    <span class="text-[12px] font-black uppercase text-blue-600">Take Label Photo</span>
                    <img id="prev-label" class="hidden absolute inset-0 w-full h-full object-cover opacity-50">
                </button>
                <input type="text" id="trackingId" placeholder="AI Tracking ID will appear here..." class="w-full border-2 p-4 rounded-2xl font-bold outline-none focus:border-blue-600 uppercase bg-slate-50">
            </div>

            <button onclick="syncToCloud()" id="syncBtn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-xs shadow-lg mt-4 flex justify-center items-center gap-2 transition active:scale-95">
                <i class="fa-solid fa-cloud-arrow-up"></i> Upload & Sync All
            </button>
        </div>
    </div>

    <div id="historySection" class="hidden space-y-4">
        <div id="historyList" class="space-y-3"></div>
    </div>
</main>

<div id="globalLoader" class="fixed inset-0 z-[500] hidden items-center justify-center p-4 modal-blur">
    <div class="bg-white px-10 py-8 rounded-[2rem] shadow-2xl flex flex-col items-center gap-4">
        <div class="animate-spin h-8 w-8 border-4 border-blue-600 border-t-transparent rounded-full"></div>
        <p class="text-[10px] font-black uppercase tracking-widest" id="loaderMsg">Please Wait...</p>
    </div>
</div>

<script>
    // ✅ YOUR SCRIPT URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcpgxDJoRyOwdct7PWtPl6HxqYv-TCiDBiQ9R26QviiGQXLcJaXXTZ30oBcsx7bYjo2A/exec"; 
    
    let labelData = "", parcelData1 = "", parcelData2 = "";
    let scanner = null;

    function toggleRiderView(v) {
        document.getElementById('scanSection').classList.toggle('hidden', v !== 'scan');
        document.getElementById('historySection').classList.toggle('hidden', v !== 'history');
        document.getElementById('tab-scan').classList.toggle('opacity-50', v !== 'scan');
        document.getElementById('tab-history').classList.toggle('opacity-50', v !== 'history');
        if(v === 'history') loadHistory();
    }

    // 🚀 IMPROVED SCANNER LOGIC
    async function startQRScanner() {
        const qrBox = document.getElementById('qr-reader');
        qrBox.classList.remove('hidden');
        scanner = new Html5Qrcode("qr-reader");
        try {
            await scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                document.getElementById('orderIdSearch').value = text;
                stopScanner();
                verifyOrderId(); // Auto-verify immediately
            });
            document.getElementById('scanBtn').innerText = "Scanning... Tap to Stop";
            document.getElementById('scanBtn').onclick = stopScanner;
        } catch (e) { alert("Camera Error: Ensure you are on HTTPS."); }
    }

    function stopScanner() {
        if(scanner) { scanner.stop(); scanner = null; }
        document.getElementById('qr-reader').classList.add('hidden');
        document.getElementById('scanBtn').innerHTML = '<i class="fa-solid fa-qrcode text-lg"></i> Direct Camera Scan';
        document.getElementById('scanBtn').onclick = startQRScanner;
    }

    // 🚀 FETCH DATA LOGIC
    async function verifyOrderId() {
        const id = document.getElementById('orderIdSearch').value.trim();
        const resEl = document.getElementById('verifyResult');
        if(!id) return;

        resEl.className = "text-[10px] font-bold mt-3 text-blue-500 block uppercase animate-pulse";
        resEl.innerHTML = "Checking database...";
        
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getOrderDetail", orderId: id }) });
            const result = await res.json();
            
            if(result.status === "success" && result.data.order) {
                resEl.className = "text-[11px] font-black mt-3 text-green-600 block bg-green-50 p-2 rounded-lg border border-green-200";
                resEl.innerHTML = `✅ Verified: ${result.data.order[1]}`;
            } else {
                resEl.className = "text-[11px] font-black mt-3 text-red-600 block bg-red-50 p-2 rounded-lg border border-red-200";
                resEl.innerHTML = "❌ Order ID Not Found";
            }
        } catch (e) { resEl.innerHTML = "Network Error."; }
    }

    function capture(type) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        input.onchange = e => { if (e.target.files[0]) compress(e.target.files[0], type); };
        input.click();
    }

    function compress(file, type) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image(); img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 800 / img.width;
                canvas.width = 800; canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                
                if(type === 'label') { 
                    labelData = base64; 
                    document.getElementById('prev-label').src = base64; 
                    document.getElementById('prev-label').classList.remove('hidden'); 
                    runOCR(base64);
                } 
                else if (type === 'parcel1') { 
                    parcelData1 = base64; 
                    document.getElementById('prev-parcel1').src = base64; 
                    document.getElementById('prev-parcel1').classList.remove('hidden'); 
                }
                else if (type === 'parcel2') { 
                    parcelData2 = base64; 
                    document.getElementById('prev-parcel2').src = base64; 
                    document.getElementById('prev-parcel2').classList.remove('hidden'); 
                }
            };
        };
    }

    async function runOCR(b64) {
        showLoader("AI Extracting AWB...");
        try {
            const res = await Tesseract.recognize(b64, 'eng');
            const words = res.data.text.split(/\s+/).map(w => w.replace(/[^a-zA-Z0-9]/g, ''));
            const longest = words.sort((a, b) => b.length - a.length)[0];
            if(longest && longest.length > 5) document.getElementById('trackingId').value = longest;
        } catch (e) {}
        hideLoader();
    }

    async function syncToCloud() {
        const id = document.getElementById('orderIdSearch').value.trim();
        const tid = document.getElementById('trackingId').value.trim();
        if(!id || !tid) { alert("ID and Tracking required."); return; }
        
        showLoader("Uploading 3 Images...");
        const payload = { 
            action: "updateTracker", 
            orderId: id, 
            courier: document.getElementById('courier').value, 
            trackingId: tid, 
            ocrData: tid, 
            riderName: "PALI_RIDER", 
            pickupDate: new Date().toLocaleDateString(), 
            trackingImg: labelData, 
            parcelImg1: parcelData1, 
            parcelImg2: parcelData2 
        };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const r = await res.json();
            if(r.status === "success") { 
                alert("Synced Successfully!"); 
                location.reload(); 
            } else { 
                alert("Error: " + r.message); 
            }
        } catch (e) { alert("Sync Failed."); }
        hideLoader();
    }

    function showLoader(m) { document.getElementById('loaderMsg').innerText = m; document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
    function hideLoader() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }
</script>
</body>
</html>
