<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Analysis | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; }
        .data-table { width: 100%; border-collapse: collapse; background: #fff; }
        .data-table th { background: #1e293b; color: #fff; font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 12px; border: 1px solid #334155; position: sticky; top: 0; }
        .data-table td { padding: 10px; font-size: 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        .data-table tr:hover { background-color: #f1f5f9 !important; }

        .badge { display: inline-block; padding: 2px 6px; font-size: 9px; font-weight: 900; border-radius: 4px; text-transform: uppercase; border: 1px solid transparent; }
        .badge-Created   { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .badge-Dispatch  { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .badge-Delivered { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
        .badge-BREACH    { background: #ffe4e6; color: #991b1b; border-color: #fecade; animation: blink 1.5s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #printArea { display: none; }
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea { display: block !important; width: 54mm; color: #000; background: #fff; padding: 1mm; font-family: Arial, sans-serif !important; line-height: 1.3; }
            #qrcode canvas { display: none !important; }
            #qrcode img { display: block !important; margin: 0 auto; width: 95px; height: 95px; }
            @page { margin: 0; size: 58mm auto; }
        }
    </style>
</head>
<body class="text-slate-900">

<nav class="bg-slate-900 text-white px-4 py-3 border-b-4 border-blue-600 sticky top-0 z-[100]">
    <div class="max-w-[1600px] mx-auto flex justify-between items-center">
        <span class="font-black text-xl tracking-tighter">DATA COMMAND</span>
        <button onclick="refreshData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-[10px] font-black uppercase shadow-lg transition">Refresh DB</button>
    </div>
</nav>

<div class="max-w-[1600px] mx-auto p-4 space-y-4">
    <div class="bg-slate-100 p-3 rounded-lg flex flex-wrap gap-3 items-center border border-slate-200">
        <div class="flex-1 min-w-[250px]"><input id="searchBox" oninput="renderTable()" type="text" placeholder="Search ID, Name, Mobile or Area..." class="w-full border border-slate-300 px-4 py-2 text-xs font-bold rounded outline-none shadow-sm"></div>
        <button id="breachToggle" onclick="toggleBreachFilter()" class="bg-white border border-slate-300 text-slate-500 hover:bg-rose-600 hover:text-white px-4 py-2 text-[10px] font-black uppercase rounded shadow-sm transition"><i class="fa-solid fa-clock-rotate-left mr-1"></i> Breach Tab</button>
    </div>

    <div class="bg-white border border-slate-200 rounded shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="data-table">
                <thead><tr><th>Date</th><th>Order ID</th><th>Customer</th><th>Mobile</th><th>Area / City</th><th>Age</th><th>Status</th><th class="text-center">Action</th></tr></thead>
                <tbody id="masterTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="viewModal" class="fixed inset-0 z-[400] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white w-full max-w-xl rounded-xl shadow-2xl overflow-hidden p-6 space-y-5">
        <div class="flex justify-between items-center"><h3 id="v_id" class="text-lg font-black text-blue-600 font-mono"></h3><button onclick="closeModals()"><i class="fa-solid fa-circle-xmark text-2xl text-slate-300"></i></button></div>
        
        <div id="viewContainer" class="space-y-4">
            <div class="bg-slate-50 p-4 border rounded-lg">
                <p id="v_name" class="font-black uppercase text-slate-800 text-lg"></p>
                <p id="v_mob" class="text-xs font-bold text-blue-600"></p>
                <p id="v_addr" class="text-[11px] text-slate-500 mt-1 leading-tight"></p>
                <button onclick="toggleEdit(true)" class="mt-3 text-[9px] font-black text-blue-600 uppercase border border-blue-200 px-3 py-1 rounded bg-white hover:bg-blue-50 transition">Modify Info</button>
            </div>
            
            <div class="p-4 bg-slate-900 rounded-xl flex items-center justify-between gap-3">
                <select id="updateStatusVal" class="flex-1 bg-slate-800 text-white text-xs font-bold p-2 rounded outline-none border border-slate-700"><option value="Created">Created</option><option value="Received">Received</option><option value="Packed">Packed</option><option value="Dispatch">Dispatch</option><option value="Delivered">Delivered</option></select>
                <button onclick="commitStatusUpdate()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-lg">Update</button>
            </div>
            <button id="modalPrintBtn" class="w-full bg-slate-100 border border-slate-200 font-black py-4 rounded uppercase text-xs">Print Slip</button>
        </div>

        <div id="editContainer" class="hidden space-y-3">
            <p class="text-[10px] font-black text-rose-600 uppercase">Editor Active</p>
            <input type="text" id="e_name" placeholder="Name" class="w-full border p-3 rounded font-bold uppercase text-xs">
            <textarea id="e_addr" placeholder="Address" class="w-full border p-3 rounded font-bold text-xs" rows="2"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <input type="tel" id="e_mob" placeholder="Mobile" class="border p-3 rounded font-bold text-xs">
                <input type="tel" id="e_alt" placeholder="Alt Mobile" class="border p-3 rounded font-bold text-xs">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="e_city" placeholder="City" class="border p-3 rounded font-bold text-xs">
                <input type="text" id="e_pin" placeholder="Pincode" class="border p-3 rounded font-bold text-xs">
            </div>
            <button onclick="saveEdits()" class="w-full bg-green-600 text-white font-black py-4 rounded uppercase text-xs shadow-lg">Save to Cloud</button>
            <button onclick="toggleEdit(false)" class="w-full text-slate-400 font-bold text-[10px] uppercase">Cancel</button>
        </div>
    </div>
</div>

<div id="globalLoader" class="fixed inset-0 z-[600] hidden items-center justify-center bg-slate-900/50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center gap-4 text-center border-t-4 border-blue-600">
        <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full"></div>
        <p id="loaderMsg" class="text-[11px] font-black uppercase text-slate-800">Processing...</p>
    </div>
</div>

<div id="printArea">
    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 10px;">
        <p style="margin: 0; font-size: 10pt; font-weight: 900; text-transform: uppercase;">LENSKART</p>
        <h1 style="margin: 0; font-size: 16pt; font-weight: 900; line-height: 1.1; text-decoration: underline;">DELIVERY SLIP</h1>
    </div>
    <div style="margin-bottom: 12px; font-size: 11pt;">
        <p style="margin: 0; font-weight: 900; text-decoration: underline;">TO,</p>
        <p style="margin: 4px 0 0 0;">Customer Name:- <span id="prName" style="text-transform: uppercase; font-weight:900;"></span></p>
        <p style="margin: 2px 0 0 0;">Address: <span id="prAddr"></span></p>
        <p style="margin: 4px 0 0 0;">Contact: <span id="prMob" style="font-weight: 900;"></span></p>
    </div>
    <div style="text-align: center; border-top: 1px dashed #000; padding-top: 10px;">
        <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 6px;"></div>
        <p style="margin: 0; font-weight: 900; font-size: 14pt;">Order id:- <span id="prId"></span></p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNWlJJBlKGzjIpkj49a7NK0O0umYK5gnRGiNFfMJgW15FFXWwvIMpBMo43E3On7bhptQ/exec";
    let allOrders = [], showBreachOnly = false, currentId = "", currentData = null;

    function showLoading(m) { document.getElementById('loaderMsg').innerText = m; document.getElementById('globalLoader').classList.replace('hidden', 'flex'); }
    function hideLoading() { document.getElementById('globalLoader').classList.replace('flex', 'hidden'); }

    async function refreshData() {
        showLoading("Syncing...");
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getAllData" }) });
            const result = await res.json();
            if (result.status === "success") { allOrders = result.orders; renderTable(); }
        } catch (e) { alert("Error"); }
        hideLoading();
    }

    function renderTable() {
        const tbody = document.getElementById('masterTableBody');
        const q = document.getElementById('searchBox').value.toUpperCase().trim();
        const now = new Date();
        const filtered = allOrders.filter(o => {
            const age = Math.floor((now - new Date(o[3])) / 864e5);
            const isB = (o[4] === 'Created' || o[4] === 'Received') && age >= 3;
            return (o[0].toUpperCase().includes(q) || o[1].toUpperCase().includes(q)) && (showBreachOnly ? isB : true);
        }).reverse();
        tbody.innerHTML = filtered.map(o => {
            const age = Math.floor((now - new Date(o[3])) / 864e5);
            const isB = (o[4] === 'Created' || o[4] === 'Received') && age >= 3;
            return `<tr><td>${new Date(o[3]).toLocaleDateString('en-IN')}</td><td class="font-black text-blue-600">${o[0]}</td><td class="font-bold uppercase">${o[1]}</td><td class="text-blue-700">${o[2]}</td><td>${age} Days</td><td><span class="badge badge-${o[4]}">${o[4]}</span> ${isB ? '<span class="badge badge-BREACH">DELAY</span>' : ''}</td><td class="text-center"><button onclick="viewOrder('${o[0]}')" class="bg-slate-900 text-white px-3 py-1 rounded text-[9px] font-black uppercase transition active:scale-95">Analyse</button></td></tr>`;
        }).join('');
    }

    async function viewOrder(id) {
        showLoading(`Analysing ${id}`);
        currentId = id;
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "getOrderDetail", orderId: id }) });
            const result = await res.json();
            currentData = result.data.order;
            document.getElementById('v_id').innerText = currentData[0];
            document.getElementById('v_name').innerText = currentData[1];
            document.getElementById('v_mob').innerText = currentData[3];
            document.getElementById('v_addr').innerText = `${currentData[2]}, ${currentData[7]} - ${currentData[5]}`;
            document.getElementById('updateStatusVal').value = currentData[11];
            document.getElementById('modalPrintBtn').onclick = () => triggerPrint(id, currentData);
            toggleEdit(false);
            document.getElementById('viewModal').classList.replace('hidden', 'flex');
        } catch (e) { alert("Error"); }
        hideLoading();
    }

    function toggleEdit(on) {
        if(on) {
            document.getElementById('e_name').value = currentData[1];
            document.getElementById('e_addr').value = currentData[2];
            document.getElementById('e_mob').value = currentData[3];
            document.getElementById('e_alt').value = currentData[4] === "N/A" ? "" : currentData[4];
            document.getElementById('e_city').value = currentData[7];
            document.getElementById('e_pin').value = currentData[5];
        }
        document.getElementById('viewContainer').classList.toggle('hidden', on);
        document.getElementById('editContainer').classList.toggle('hidden', !on);
    }

    async function saveEdits() {
        if(!confirm("Update cloud data permanently?")) return;
        showLoading("Updating...");
        const payload = {
            action: "editOrder", orderId: currentId,
            name: document.getElementById('e_name').value.trim(),
            address: document.getElementById('e_addr').value.trim(),
            mobile: document.getElementById('e_mob').value.trim(),
            altMobile: document.getElementById('e_alt').value.trim(),
            pincode: document.getElementById('e_pin').value.trim(),
            city: document.getElementById('e_city').value.trim(),
            postOffice: currentData[6], state: currentData[8], landmark: currentData[9]
        };
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            if((await res.json()).status === "success") { alert("Changes Saved!"); refreshData(); closeModals(); }
        } catch (e) { alert("Failed"); }
        hideLoading();
    }

    async function commitStatusUpdate() {
        showLoading("Updating...");
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "updateStatus", orderId: currentId, status: document.getElementById('updateStatusVal').value }) });
            if((await res.json()).status === "success") { alert("Updated!"); refreshData(); closeModals(); }
        } catch (e) { alert("Failed"); }
        hideLoading();
    }

    function triggerPrint(orderId, d) {
        document.getElementById('prId').innerText = orderId;
        document.getElementById('prName').innerText = d[1];
        document.getElementById('prAddr').innerText = d[2];
        document.getElementById('prMob').innerText = d[3];
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: orderId, width: 95, height: 95 });
        setTimeout(() => window.print(), 800);
    }

    function closeModals() { document.getElementById('viewModal').classList.replace('flex', 'hidden'); }
    function toggleBreachFilter() { showBreachOnly = !showBreachOnly; renderTable(); }
    window.onload = refreshData;
</script>
</body>
</html>
